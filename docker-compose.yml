services:
  pallasbot:
    container_name: pallasbot
    image: ghcr.io/ylovexln/pallas-bot:latest
    restart: always
    ports:
      - 8088:8088
    environment:
      TZ: Asia/Shanghai
      ENVIRONMENT: prod
      APP_MODULE: bot:app
      MAX_WORKERS: 1
    volumes:
      - ./data:/app/data
      - ./resource/:/app/resource
      - ./.env:/app/.env